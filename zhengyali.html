        function clearBgmLoadError() {

          bgmErrorMsg.textContent = "";
          bgmErrorMsg.hidden = true;
        }

        function setBgmLoadError(text) {
          if (!bgmErrorMsg) return;
          bgmErrorMsg.textContent = text;
          bgmErrorMsg.hidden = false;
        }

        function setKnobSongVisual() {
          if (knobSongNameText) knobSongNameText.textContent = TRACK_LABELS[songDetent];
        }

        function syncVolSliderFromVolume() {
          if (!volSlider) return;
          const v = Math.max(0, Math.min(100, Math.round(bgmVolume * 100)));
          volSlider.value = String(v);
          volSlider.setAttribute("aria-valuenow", String(v));
        }

        function applyBgmVolume() {
          if (!bgmEl) return;
          bgmEl.volume = Math.max(0, Math.min(1, bgmVolume));
        }

        function syncMuteBtnClass() {
          if (!muteBtn) return;
          muteBtn.classList.toggle("is-muted", bgmSpeakerMuted);
          muteBtn.setAttribute("aria-label", bgmSpeakerMuted ? "取消静音" : "静音");
        }

        function updateBgmToggleUi() {
          if (!bgmToggleBtn || !bgmEl) return;
          const hasSrc = Boolean(bgmEl.src);
          /* 正在出声播放：两竖（点按将暂停）；暂停或无音源：三角（点按将播放） */
          const playing = hasSrc && !bgmEl.paused;
          bgmToggleBtn.classList.toggle("is-playing", playing);
          const playIcon = bgmToggleBtn.querySelector(".media-btn__icon--play");
          const pauseIcon = bgmToggleBtn.querySelector(".media-btn__icon--pause");
          if (playIcon) playIcon.setAttribute("aria-hidden", playing ? "true" : "false");
          if (pauseIcon) pauseIcon.setAttribute("aria-hidden", playing ? "false" : "true");
          bgmToggleBtn.setAttribute("aria-label", playing ? "暂停" : "播放");
          if (knobSongNameNote) {
            knobSongNameNote.classList.toggle("knob-song-name__note--bouncing", playing);
          }
        }

        function afterBgmPlay(p) {
          if (p && typeof p.then === "function") {
            void p.then(updateBgmToggleUi).catch(updateBgmToggleUi);
          } else {
            updateBgmToggleUi();
          }
        }

        function updateSectionDots(index) {
          sectionDots.forEach(function (dot) {
            const j = Number(dot.getAttribute("data-i"));
            const on = index >= 0 && j === index;
            dot.classList.toggle("on", on);
            dot.setAttribute("aria-pressed", on ? "true" : "false");
          });
        }

        async function startBgmTrack(si) {
          if (!bgmEl) return;
          clearBgmLoadError();
          const req = ++bgmRequestId;
          applyBgmVolume();
          bgmEl.loop = true;
          const urls = TRACK_URL_OPTIONS[si] || [];
          let played = false;
          for (let u = 0; u < urls.length; u++) {
            if (req !== bgmRequestId) return;
            try {
              bgmEl.pause();
            } catch (_) {}
            bgmEl.src = urls[u];
            try {
              await bgmEl.play();
              if (req !== bgmRequestId) return;
              played = true;
              bgmEverPlaying = true;
              bgmTrackLoadedIndex = si;
              if (knobSongNameText) knobSongNameText.textContent = TRACK_LABELS[si];
              updateBgmToggleUi();
              break;
            } catch (_) {
              /* 尝试下一 URL */
            }
          }
          if (req !== bgmRequestId) return;
          if (!played) {
            bgmEverPlaying = false;
            bgmTrackLoadedIndex = null;
            if (knobSongNameText) knobSongNameText.textContent = "未找到 · " + TRACK_LABELS[si];
            setBgmLoadError("该曲目无法在线播放，请检查网络或将对应 mp3 放入 music_songs 文件夹。");
          }
          updateBgmToggleUi();
        }

        function eduCarouselComputeBest(vp, slides) {
          let best = 0;
          let bestDist = Infinity;
          const center = vp.scrollLeft + vp.clientWidth * 0.5;
          for (let j = 0; j < slides.length; j++) {
            const s = slides[j];
            const mid = s.offsetLeft + s.offsetWidth * 0.5;
            const d = Math.abs(mid - center);
            if (d < bestDist) {
              bestDist = d;
              best = j;
            }
          }
          return best;
        }

        function eduCarouselCenterScrollLeft(vp, slide) {
          const left = slide.offsetLeft + slide.offsetWidth * 0.5 - vp.clientWidth * 0.5;
          const max = Math.max(0, vp.scrollWidth - vp.clientWidth);
          return Math.max(0, Math.min(left, max));
        }

        function initEduCarouselDupes(carousel) {
          const vp = carousel.querySelector(".edu-carousel__viewport");
          if (!vp) return;
          const slides = vp.querySelectorAll(".edu-carousel__slide");
          if (slides.length !== 3) return;
          for (let k = 0; k < 3; k++) {
            vp.appendChild(slides[k].cloneNode(true));
          }
        }

        function updateEduCarouselSlidesState(carousel) {
          const vp = carousel.querySelector(".edu-carousel__viewport");
          const slides = carousel.querySelectorAll(".edu-carousel__slide");
          if (!vp || !slides.length) return;
          const best = eduCarouselComputeBest(vp, slides);
          carousel.dataset.slide = String(best);
          slides.forEach(function (s, j) {
            s.classList.toggle("edu-carousel__slide--dim", j !== best);
          });
        }

        /** delta 为 -1（上一张）或 +1（下一张）；6 张循环时在边界先无动画对齐同内容副本再平滑滚向目标，避免长距回弹 */
        function eduCarouselGo(carousel, delta) {
          const slides = carousel.querySelectorAll(".edu-carousel__slide");
          const vp = carousel.querySelector(".edu-carousel__viewport");
          if (!slides.length || !vp) return;
          const n = slides.length;
          const curr = Number(carousel.dataset.slide) || 0;
          let target = (((curr + delta) % n) + n) % n;
          if (n === 6) {
            if (curr === 5 && delta > 0 && target === 0) {
              vp.scrollTo({ left: eduCarouselCenterScrollLeft(vp, slides[2]), behavior: "auto" });
              target = 3;
            } else if (curr === 0 && delta < 0 && target === 5) {
              vp.scrollTo({ left: eduCarouselCenterScrollLeft(vp, slides[3]), behavior: "auto" });
              target = 2;
            }
          }
          carousel.dataset.slide = String(target);
          vp.scrollTo({
            left: eduCarouselCenterScrollLeft(vp, slides[target]),
            behavior: window.matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto" : "smooth",
          });
        }

        function wireEduCarouselScroll(carousel) {
          if (carousel.dataset.eduScrollWired === "1") return;
          carousel.dataset.eduScrollWired = "1";
          const vp = carousel.querySelector(".edu-carousel__viewport");
          if (!vp) return;
          function onScrollTick() {
            window.requestAnimationFrame(function () {
              updateEduCarouselSlidesState(carousel);
            });
          }
          vp.addEventListener("scroll", onScrollTick, { passive: true });
          if ("onscrollend" in vp) {
            vp.addEventListener("scrollend", onScrollTick, { passive: true });
          }
        }

        function showPanel(index) {
          const p = panels[index];
          if (!p) return;
          contentWrap.hidden = false;
          kicker.textContent = noteNames[index] + " — " + p.title;
          titleEl.textContent = p.title;
          bodyEl.innerHTML = p.html;
          if (index === 0) {
            const ec = bodyEl.querySelector(".edu-carousel");
            if (ec) {
              initEduCarouselDupes(ec);
              wireEduCarouselScroll(ec);
              const vp = ec.querySelector(".edu-carousel__viewport");
              const slides = ec.querySelectorAll(".edu-carousel__slide");
              /* 只滚轮播视口，避免 scrollIntoView 带动整页纵向跳动（behavior 须用 auto/smooth，instant 非标准且部分浏览器会抛错） */
              if (vp && slides[1]) {
                try {
                  vp.scrollTo({
                    left: eduCarouselCenterScrollLeft(vp, slides[1]),
                    behavior: "auto",
                  });
                } catch (scrollErr) {
                  if (typeof console !== "undefined" && console.warn) {
                    console.warn("[教育轮播] 初始 scrollTo 失败:", scrollErr);
                  }
                }
                window.requestAnimationFrame(function () {
                  window.requestAnimationFrame(function () {
                    updateEduCarouselSlidesState(ec);
                  });
                });
              }
            }
          }
          detail.classList.remove("is-visible");
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              detail.classList.add("is-visible");
            });
          });
        }

        function selectSection(index) {
          if (index < 0 || index > 6) return;
          updateSectionDots(index);
          setKnobSongVisual();
          applyBgmVolume();
          showPanel(index);
          if (sectionCurrentEl && panels[index]) {
            sectionCurrentEl.textContent = panels[index].title;
          }
          keys.forEach(function (k, i) {
            k.classList.toggle("is-active", i === index);
            k.setAttribute("aria-expanded", i === index ? "true" : "false");
          });
        }

        function activatePianoSection(index) {
          if (!Number.isFinite(index) || index < 0 || index > 6) return;
          void playNote(index);
          selectSection(index);
        }

        setKnobSongVisual();
        syncVolSliderFromVolume();
        applyBgmVolume();
        syncMuteBtnClass();
        updateBgmToggleUi();

        if (bgmEl) {
          bgmEl.addEventListener("play", updateBgmToggleUi);
          bgmEl.addEventListener("pause", updateBgmToggleUi);
        }

        function preventFocusScroll(e) {
          if (e.button === 0) e.preventDefault();
        }
        /* 媒体按钮：mousedown preventDefault 避免页面滚动；勿绑在白键上 */
        document.querySelectorAll(".media-btn, .media-toolbar__vol-btn, .section-dot").forEach(function (el) {
          el.addEventListener("mousedown", preventFocusScroll);
        });

        keys.forEach(function (key) {
          key.addEventListener(
            "pointerdown",
            function (e) {
              if (e.pointerType === "mouse" && e.button !== 0) return;
              key.dataset.pianoArm = "1";
              const i = Number(key.getAttribute("data-index"));
              activatePianoSection(i);
            },
            { passive: true }
          );
          key.addEventListener(
            "click",
            function () {
              if (key.dataset.pianoArm === "1") {
                delete key.dataset.pianoArm;
                return;
              }
              const i = Number(key.getAttribute("data-index"));
              activatePianoSection(i);
            },
            { passive: true }
          );
        });

        sectionDots.forEach(function (dot) {
          dot.addEventListener(
            "pointerdown",
            function (e) {
              if (e.pointerType === "mouse" && e.button !== 0) return;
              dot.dataset.pianoArm = "1";
              const i = Number(dot.getAttribute("data-i"));
              activatePianoSection(i);
            },
            { passive: true }
          );
          dot.addEventListener("click", function () {
            if (dot.dataset.pianoArm === "1") {
              delete dot.dataset.pianoArm;
              return;
            }
            const i = Number(dot.getAttribute("data-i"));
            activatePianoSection(i);
          });
        });

        document.getElementById("knob-track-prev").addEventListener("click", function () {
          songDetent = (songDetent + TRACK_COUNT - 1) % TRACK_COUNT;
          setKnobSongVisual();
          void startBgmTrack(songDetent);
        });
        document.getElementById("knob-track-next").addEventListener("click", function () {
          songDetent = (songDetent + 1) % TRACK_COUNT;
          setKnobSongVisual();
          void startBgmTrack(songDetent);
        });
        if (bgmToggleBtn) {
          bgmToggleBtn.addEventListener("click", function () {
            if (!bgmEl) return;
            const willStartPlayback = !bgmEl.src || bgmEl.paused;
            if (bgmPlayBtnFirstUse && willStartPlayback) {
              bgmPlayBtnFirstUse = false;
              if (bgmVolume <= 0) {
                bgmSpeakerMuted = false;
                syncMuteBtnClass();
                bgmVolume = 0.2;
                bgmVolumeRestore = 0.2;
                syncVolSliderFromVolume();
                applyBgmVolume();
              }
            }
            if (!bgmEl.src) {
              void startBgmTrack(songDetent);
              return;
            }
            if (bgmEl.paused) {
              afterBgmPlay(bgmEl.play());
            } else {
              bgmEl.pause();
              updateBgmToggleUi();
            }
          });
        }
        if (muteBtn) {
          muteBtn.addEventListener("click", function () {
            if (bgmSpeakerMuted) {
              bgmSpeakerMuted = false;
              bgmVolume = bgmVolumeRestore > 0 ? bgmVolumeRestore : 0.3;
            } else {
              bgmSpeakerMuted = true;
              if (bgmVolume > 0) bgmVolumeRestore = bgmVolume;
              bgmVolume = 0;
            }
            syncVolSliderFromVolume();
            applyBgmVolume();
            syncMuteBtnClass();
          });
        }
        if (volSlider) {
          volSlider.addEventListener("input", function () {
            bgmVolume = Number(volSlider.value) / 100;
            if (bgmVolume > 0) {
              bgmVolumeRestore = bgmVolume;
              if (bgmSpeakerMuted) {
                bgmSpeakerMuted = false;
                syncMuteBtnClass();
              }
            }
            applyBgmVolume();
            volSlider.setAttribute("aria-valuenow", String(volSlider.value));
          });
        }

        const musicDeckCycleAt = new WeakMap();
        function cycleMusicDeck(deck) {
          if (!deck || !bodyEl.contains(deck)) return;
          const now = Date.now();
          const last = musicDeckCycleAt.get(deck) || 0;
          if (now - last < 300) return;
          musicDeckCycleAt.set(deck, now);
          const prev = Number(deck.dataset.rotate) || 0;
          const next = (prev + 1) % TRACK_COUNT;
          deck.dataset.rotate = String(next);
          deck.classList.remove("music-deck--r0", "music-deck--r1", "music-deck--r2", "music-deck--r3");
          deck.classList.add("music-deck--r" + next);
        }

        detail.addEventListener("click", function (e) {
          const car = e.target.closest(".edu-carousel");
          if (car && bodyEl.contains(car)) {
            if (e.target.closest(".edu-carousel__arrow--prev")) {
              e.preventDefault();
              eduCarouselGo(car, -1);
              return;
            }
            if (e.target.closest(".edu-carousel__arrow--next")) {
              e.preventDefault();
              eduCarouselGo(car, 1);
              return;
            }
          }
          const deck = e.target.closest(".music-deck");
          if (!deck || !bodyEl.contains(deck)) return;
          cycleMusicDeck(deck);
        });

      })();
    </script>
  </body>
</html>
